<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>viewports — responsive preview</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='28'>◈</text></svg>" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Toolbar -->
  <header class="toolbar" id="toolbar">
    <div class="toolbar-left">
      <div class="logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">viewports</span>
      </div>
    </div>

    <div class="toolbar-center">
      <div class="url-form" id="urlForm">
        <div class="url-input-wrap">
          <svg class="url-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 2C5.58 2 2 5.58 2 10s3.58 8 8 8 8-3.58 8-8-3.58-8-8-8zm5.93 7H14c-.15-2.02-.78-3.88-1.8-5.45A6.06 6.06 0 0115.93 9zM10 16c-1.17 0-2.32-1.84-2.9-5H13c-.58 3.16-1.73 5-3 5zm-3-7c.58-3.16 1.73-5 3-5s2.42 1.84 3 5H7zm.8-6.45A11.8 11.8 0 006 9H4.07A6.06 6.06 0 017.8 3.55zM4.07 11H6c.15 2.02.78 3.88 1.8 5.45A6.06 6.06 0 014.07 11zm8.13 5.45C13.22 14.88 13.85 13.02 14 11h1.93a6.06 6.06 0 01-3.73 5.45z" fill="currentColor"/>
          </svg>
          <input
            type="text"
            id="urlInput"
            class="url-input"
            placeholder="https://localhost:3000"
            spellcheck="false"
            autocomplete="off"
          />
          <button class="url-clear" id="urlClear" title="Clear URL">
            <svg viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
        </div>
        <button class="btn btn-primary" id="loadBtn">Load</button>
      </div>
    </div>

    <div class="toolbar-right">
      <div class="zoom-control">
        <button class="icon-btn" id="zoomOut" title="Zoom out">
          <svg viewBox="0 0 16 16" fill="none"><path d="M3 8h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
        <span class="zoom-label" id="zoomLabel">50%</span>
        <button class="icon-btn" id="zoomIn" title="Zoom in">
          <svg viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
        <button class="btn btn-ghost" id="fitBtn" title="Fit all to screen">Fit</button>
      </div>

      <div class="toolbar-divider"></div>

      <button class="icon-btn" id="reloadBtn" title="Reload all viewports">
        <svg viewBox="0 0 16 16" fill="none"><path d="M13.5 8a5.5 5.5 0 11-1.1-3.3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M13.5 2v3h-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>

      <button class="icon-btn" id="screenshotBtn" title="Screenshot for marketing (share your screen when prompted)">
        <svg viewBox="0 0 16 16" fill="none"><rect x="1.5" y="3.5" width="13" height="10" rx="1.5" stroke="currentColor" stroke-width="1.4"/><circle cx="8" cy="8.5" r="2.2" stroke="currentColor" stroke-width="1.4"/><path d="M5.5 3.5V3a1 1 0 0 1 1-1h3a1 1 0 0 1 1 1v.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      </button>

      <button class="icon-btn" id="addDeviceBtn" title="Add custom device">
        <svg viewBox="0 0 16 16" fill="none"><path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
  </header>

  <!-- Device selector bar -->
  <div class="device-bar" id="deviceBar">
    <div class="device-bar-inner" id="deviceBarInner">
      <!-- populated by JS -->
    </div>
  </div>

  <!-- Empty state -->
  <div class="empty-state" id="emptyState" style="display:none">
    <div class="empty-icon">◈</div>
    <h2>Enter a URL to get started</h2>
    <p>Type a URL in the toolbar above and click <strong>Load</strong>, or run:<br/>
    <code>viewports http://localhost:3000</code></p>
    <div class="empty-devices-hint" id="emptyDevicesHint" style="display:none">
      <p>No devices selected. Enable at least one device from the bar above.</p>
    </div>
  </div>

  <!-- Viewport canvas -->
  <main class="canvas" id="canvas">
    <div class="canvas-inner" id="canvasInner"></div>
  </main>

  <!-- Custom device modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 class="modal-title">Add Custom Device</h3>
        <button class="icon-btn modal-close" id="modalClose">
          <svg viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Device Name</label>
            <input type="text" id="customName" class="form-input" placeholder="My Device" />
          </div>
        </div>
        <div class="form-row two-col">
          <div class="form-group">
            <label class="form-label">Width (px)</label>
            <input type="number" id="customWidth" class="form-input" placeholder="1440" min="240" max="3840" />
          </div>
          <div class="form-group">
            <label class="form-label">Height (px)</label>
            <input type="number" id="customHeight" class="form-input" placeholder="900" min="240" max="2400" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Type</label>
            <div class="type-selector" id="customType">
              <button class="type-btn" data-type="mobile">Mobile</button>
              <button class="type-btn" data-type="tablet">Tablet</button>
              <button class="type-btn active" data-type="laptop">Laptop</button>
              <button class="type-btn" data-type="desktop">Desktop</button>
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="modalCancel">Cancel</button>
        <button class="btn btn-primary" id="modalAdd">Add Device</button>
      </div>
    </div>
  </div>

  <script src="app.js" type="module"></script>
</body>
</html>
